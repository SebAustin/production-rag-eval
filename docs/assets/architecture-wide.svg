    <text class="bt" x="1340" y="283" text-anchor="middle" fill="#2C2C2A">RAGAS</text>
    <text class="bs" x="1340" y="306" text-anchor="middle" fill="#5F5E5A">faithfulness</text>
  </g>
  <g>
    <rect x="1160" y="350" width="360" height="80" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
    <text class="bt" x="1340" y="383" text-anchor="middle" fill="#2C2C2A">Vectara HHEM</text>
    <text class="bs" x="1340" y="406" text-anchor="middle" fill="#5F5E5A">hallucination</text>
  </g>
  <g>
    <rect x="1160" y="450" width="360" height="80" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
    <text class="bt" x="1340" y="483" text-anchor="middle" fill="#2C2C2A">DeepEval</text>
    <text class="bs" x="1340" y="506" text-anchor="middle" fill="#5F5E5A">G-Eval financial</text>
  </g>
  <g>
    <rect x="1160" y="550" width="360" height="80" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
    <text class="bt" x="1340" y="583" text-anchor="middle" fill="#173404">Citation coverage</text>
    <text class="bs" x="1340" y="606" text-anchor="middle" fill="#3B6D11">≥ 1 per answer</text>
  </g>

  <text x="40" y="868" font-size="14" font-weight="600" fill="#5F5E5A">Measured on FinanceBench test split (n=30) — reproduced from the harness, not hand-picked</text>
  <g>
    <rect x="40" y="884" width="288" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="184" y="926" text-anchor="middle" fill="#854F0B">0.83</text>
    <text class="klbl" x="184" y="952" text-anchor="middle">RAGAS faithfulness</text>
  </g>
  <g>
    <rect x="348" y="884" width="288" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="492" y="926" text-anchor="middle" fill="#3B6D11">1.00</text>
    <text class="klbl" x="492" y="952" text-anchor="middle">citation coverage</text>
  </g>
  <g>
    <rect x="656" y="884" width="288" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="800" y="926" text-anchor="middle" fill="#0F6E56">7%</text>
    <text class="klbl" x="800" y="952" text-anchor="middle">abstention rate</text>
  </g>
  <g>
    <rect x="964" y="884" width="288" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="1108" y="926" text-anchor="middle" fill="#3B6D11">$0.011</text>
    <text class="klbl" x="1108" y="952" text-anchor="middle">cost per question</text>
  </g>
  <g>
    <rect x="1272" y="884" width="288" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="1416" y="926" text-anchor="middle" fill="#3B6D11">0.91</text>
    <text class="klbl" x="1416" y="952" text-anchor="middle">dense recall@10</text>
  </g>
</svg>
