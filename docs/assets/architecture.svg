<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1480" width="1000" height="1480" font-family="Inter, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .panel { fill:#FAFAF7; stroke:#D3D1C7; stroke-width:1.5; }
      .plabel { font-size:18px; font-weight:600; fill:#5F5E5A; }
      .bt { font-size:16px; font-weight:500; }
      .bs { font-size:13px; font-weight:400; }
      .arr { stroke:#888780; stroke-width:2; fill:none; }
      .alabel { font-size:12px; font-weight:400; fill:#5F5E5A; }
      .legtxt { font-size:13px; font-weight:400; fill:#5F5E5A; }
      .kfig { font-size:26px; font-weight:700; }
      .klbl { font-size:12.5px; font-weight:400; fill:#5F5E5A; }
    </style>
  </defs>

  <rect width="1000" height="1480" fill="white"/>

  <text x="40" y="52" font-size="28" font-weight="700" fill="#26215C">Production RAG · FinanceBench</text>
  <text x="40" y="80" font-size="15" font-weight="400" fill="#5F5E5A">Hybrid retrieval · contextual chunks · conformal abstention · grounded generation · triple eval</text>

  <rect x="40" y="100" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text class="legtxt" x="60" y="111">Store / index</text>
  <rect x="200" y="100" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text class="legtxt" x="220" y="111">Processing</text>
  <rect x="360" y="100" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
  <text class="legtxt" x="380" y="111">Decision gate</text>
  <rect x="540" y="100" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.2"/>
  <text class="legtxt" x="560" y="111">Grounded answer</text>
  <rect x="760" y="100" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
  <text class="legtxt" x="780" y="111">Neutral / abstain</text>

  <g transform="translate(0,140)">
    <rect class="panel" x="30" y="30" width="940" height="180" rx="16"/>
    <text class="plabel" x="52" y="62">① Offline · indexing (run once)</text>

    <g>
      <rect x="60" y="100" width="200" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
      <text class="bt" x="160" y="133" text-anchor="middle" fill="#26215C">FinanceBench</text>
      <text class="bs" x="160" y="156" text-anchor="middle" fill="#3C3489">150 Q&amp;A · 10-K chunks</text>
    </g>
    <g>
      <rect x="286" y="100" width="200" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text class="bt" x="386" y="133" text-anchor="middle" fill="#04342C">Chunker</text>
      <text class="bs" x="386" y="156" text-anchor="middle" fill="#0F6E56">512-token recursive</text>
    </g>
    <g>
      <rect x="512" y="100" width="200" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text class="bt" x="612" y="133" text-anchor="middle" fill="#04342C">Contextual prefix</text>
      <text class="bs" x="612" y="156" text-anchor="middle" fill="#0F6E56">Claude Haiku per chunk</text>
    </g>
    <g>
      <rect x="738" y="100" width="200" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
      <text class="bt" x="838" y="133" text-anchor="middle" fill="#26215C">Hybrid index</text>
      <text class="bs" x="838" y="156" text-anchor="middle" fill="#3C3489">Qdrant + BM25</text>
    </g>
    <line class="arr" x1="262" y1="140" x2="282" y2="140" marker-end="url(#arrow)"/>
    <line class="arr" x1="488" y1="140" x2="508" y2="140" marker-end="url(#arrow)"/>
    <line class="arr" x1="714" y1="140" x2="734" y2="140" marker-end="url(#arrow)"/>

    <rect class="panel" x="30" y="250" width="940" height="720" rx="16"/>
    <text class="plabel" x="52" y="282">② Online · query → answer</text>

    <g>
      <rect x="410" y="320" width="180" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
      <text class="bt" x="500" y="348" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Query</text>
    </g>
    <line class="arr" x1="500" y1="376" x2="500" y2="398"/>
    <line class="arr" x1="500" y1="398" x2="356" y2="418" marker-end="url(#arrow)"/>
    <line class="arr" x1="500" y1="398" x2="644" y2="418" marker-end="url(#arrow)"/>

    <g>
      <rect x="230" y="420" width="240" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text class="bt" x="350" y="445" text-anchor="middle" fill="#04342C">BM25 retrieve</text>
      <text class="bs" x="350" y="467" text-anchor="middle" fill="#0F6E56">top-50 lexical</text>
    </g>
    <g>
      <rect x="530" y="420" width="240" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text class="bt" x="650" y="445" text-anchor="middle" fill="#04342C">Dense retrieve</text>
      <text class="bs" x="650" y="467" text-anchor="middle" fill="#0F6E56">voyage-3-large · top-50</text>
    </g>
    <line class="arr" x1="350" y1="484" x2="478" y2="538" marker-end="url(#arrow)"/>
    <line class="arr" x1="650" y1="484" x2="522" y2="538" marker-end="url(#arrow)"/>

    <g>
      <rect x="410" y="540" width="180" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text class="bt" x="500" y="561" text-anchor="middle" fill="#04342C">RRF fusion</text>
      <text class="bs" x="500" y="582" text-anchor="middle" fill="#0F6E56">k = 60</text>
    </g>
    <line class="arr" x1="500" y1="596" x2="500" y2="628" marker-end="url(#arrow)"/>

    <g>
      <rect x="395" y="630" width="210" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text class="bt" x="500" y="655" text-anchor="middle" fill="#04342C">Cohere Rerank 3.5</text>
      <text class="bs" x="500" y="677" text-anchor="middle" fill="#0F6E56">top-10 passages</text>
    </g>
    <line class="arr" x1="500" y1="694" x2="500" y2="700" marker-end="url(#arrow)"/>

    <polygon points="500,702 572,772 500,842 428,772" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
    <text class="bt" x="500" y="766" text-anchor="middle" fill="#412402">Conformal gate</text>
    <text class="bs" x="500" y="787" text-anchor="middle" fill="#854F0B">τ · α = 0.10</text>

    <line class="arr" x1="486" y1="828" x2="386" y2="856" marker-end="url(#arrow)"/>
    <line class="arr" x1="514" y1="828" x2="614" y2="856" marker-end="url(#arrow)"/>
    <text class="alabel" x="404" y="846" text-anchor="end">answer</text>
    <text class="alabel" x="596" y="846" text-anchor="start">abstain</text>

    <g>
      <rect x="250" y="858" width="240" height="72" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
      <text class="bt" x="370" y="887" text-anchor="middle" fill="#173404">Claude Sonnet 4.6</text>
      <text class="bs" x="370" y="909" text-anchor="middle" fill="#3B6D11">Citations API · grounded</text>
    </g>
    <g>
      <rect x="530" y="858" width="240" height="72" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
      <text class="bt" x="650" y="887" text-anchor="middle" fill="#2C2C2A">Abstain</text>
      <text class="bs" x="650" y="909" text-anchor="middle" fill="#5F5E5A">insufficient confidence</text>
    </g>

    <rect class="panel" x="30" y="1010" width="940" height="140" rx="16"/>
    <text class="plabel" x="52" y="1042">③ Evaluation</text>

    <line class="arr" x1="370" y1="930" x2="170" y2="1062" marker-end="url(#arrow)"/>
    <line class="arr" x1="370" y1="930" x2="386" y2="1062" marker-end="url(#arrow)"/>
    <line class="arr" x1="370" y1="930" x2="612" y2="1062" marker-end="url(#arrow)"/>
    <line class="arr" x1="370" y1="930" x2="828" y2="1062" marker-end="url(#arrow)"/>

    <g>
      <rect x="60" y="1064" width="220" height="70" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
      <text class="bt" x="170" y="1092" text-anchor="middle" fill="#2C2C2A">RAGAS</text>
      <text class="bs" x="170" y="1114" text-anchor="middle" fill="#5F5E5A">faithfulness</text>
    </g>
    <g>
      <rect x="296" y="1064" width="180" height="70" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
      <text class="bt" x="386" y="1092" text-anchor="middle" fill="#2C2C2A">Vectara HHEM</text>
      <text class="bs" x="386" y="1114" text-anchor="middle" fill="#5F5E5A">hallucination</text>
    </g>
    <g>
      <rect x="492" y="1064" width="240" height="70" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
      <text class="bt" x="612" y="1092" text-anchor="middle" fill="#2C2C2A">DeepEval</text>
      <text class="bs" x="612" y="1114" text-anchor="middle" fill="#5F5E5A">G-Eval financial</text>
    </g>
    <g>
      <rect x="748" y="1064" width="190" height="70" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
      <text class="bt" x="843" y="1092" text-anchor="middle" fill="#173404">Citation coverage</text>
      <text class="bs" x="843" y="1114" text-anchor="middle" fill="#3B6D11">≥ 1 per answer</text>
    </g>
  </g>

  <text x="40" y="1330" font-size="14" font-weight="600" fill="#5F5E5A">Measured on FinanceBench test split (n=30) — reproduced from the harness, not hand-picked</text>

  <g>
    <rect x="30" y="1345" width="180" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="120" y="1385" text-anchor="middle" fill="#854F0B">0.83</text>
    <text class="klbl" x="120" y="1411" text-anchor="middle">RAGAS faithfulness</text>
  </g>
  <g>
    <rect x="220" y="1345" width="180" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="310" y="1385" text-anchor="middle" fill="#3B6D11">1.00</text>
    <text class="klbl" x="310" y="1411" text-anchor="middle">citation coverage</text>
  </g>
  <g>
    <rect x="410" y="1345" width="180" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="500" y="1385" text-anchor="middle" fill="#0F6E56">7%</text>
    <text class="klbl" x="500" y="1411" text-anchor="middle">abstention rate</text>
  </g>
  <g>
    <rect x="600" y="1345" width="180" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="690" y="1385" text-anchor="middle" fill="#3B6D11">$0.011</text>
    <text class="klbl" x="690" y="1411" text-anchor="middle">cost per question</text>
  </g>
  <g>
    <rect x="790" y="1345" width="180" height="84" rx="10" fill="#FAFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
    <text class="kfig" x="880" y="1385" text-anchor="middle" fill="#3B6D11">0.91</text>
    <text class="klbl" x="880" y="1411" text-anchor="middle">dense recall@10</text>
  </g>

  <text x="40" y="1458" font-size="12" font-weight="400" font-style="italic" fill="#888780">Full metrics table and retrieval ablation in the README · every number reproducible with `make eval`</text>
</svg>
